name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  lint-and-static:
    name: Lint & Static Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Python syntax compile check
        run: python -m compileall -q .

  sqlite-tests-and-coverage:
    name: Django Tests (SQLite) + Coverage
    runs-on: ubuntu-latest
    needs: lint-and-static
    defaults:
      run:
        working-directory: app
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_ENGINE: django.db.backends.sqlite3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install coverage

      - name: Django system checks
        run: python manage.py check --fail-level ERROR

      - name: Ensure migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        run: coverage run manage.py test core --verbosity 2

      - name: Build coverage report
        run: |
          coverage xml -o coverage.xml
          coverage report --skip-covered --show-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: app/coverage.xml
          if-no-files-found: error

  mysql-smoke-check:
    name: Django Smoke (MariaDB)
    runs-on: ubuntu-latest
    needs: lint-and-static
    defaults:
      run:
        working-directory: app
    services:
      db:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: minigolf_ci
          MYSQL_USER: minigolf
          MYSQL_PASSWORD: minigolf_pwd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_ENGINE: django.db.backends.mysql
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "3306"
      MYSQL_DATABASE: minigolf_ci
      MYSQL_USER: minigolf
      MYSQL_PASSWORD: minigolf_pwd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install system packages for mysqlclient
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config mariadb-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mariadb-admin ping -h 127.0.0.1 -P 3306 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" --silent; then
              echo "MariaDB is ready"
              break
            fi
            echo "Waiting for MariaDB..."
            sleep 2
          done
          mariadb-admin ping -h 127.0.0.1 -P 3306 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" --silent

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Validate ORM roundtrip against MariaDB
        run: |
          python manage.py shell -c "from core.models import Player; Player.objects.create(name='CI Smoke User'); print(Player.objects.filter(name='CI Smoke User').count())"

      - name: Collect static files
        run: python manage.py collectstatic --noinput --clear

      - name: Django DB checks
        run: python manage.py check --database default --fail-level ERROR

  dependency-audit:
    name: Dependency Audit (non-blocking)
    runs-on: ubuntu-latest
    needs: lint-and-static
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Scan dependencies
        run: pip-audit -r app/requirements.txt -f json -o pip-audit.json

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: warn

  docker-validate-and-build:
    name: Docker Compose Validate + Image Build
    runs-on: ubuntu-latest
    needs:
      - sqlite-tests-and-coverage
      - mysql-smoke-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          push: false
          tags: teamminigolf-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max