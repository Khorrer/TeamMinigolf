name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment-Ziel"
        required: true
        type: choice
        options: [dev, staging, production]
        default: dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DOCKER_IMAGE: teamminigolf-web

jobs:
  quality:
    name: Python-Qualität
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r app/requirements.txt
          python -m pip install ruff pip-audit

      - name: Ruff Format-Check
        run: python -m ruff format --check .

      - name: Ruff Lint
        run: python -m ruff check .

      - name: Security-Scan Python-Abhängigkeiten
        run: python -m pip_audit -r app/requirements.txt

  docker-smoke-test:
    name: Docker Smoke-Test + Django Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: CI .env erstellen
        run: |
          cat > .env << 'EOF'
          DJANGO_SECRET_KEY=ci-secret-key-for-actions-only
          DJANGO_DEBUG=1
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          MYSQL_ROOT_PASSWORD=rootpass
          MYSQL_DATABASE=minigolf
          MYSQL_USER=minigolf
          MYSQL_PASSWORD=minigolf_pwd
          BACKUP_RETAIN_DAYS=7
          EOF

      - name: Docker-Stack starten
        run: docker compose up -d --build db web

      - name: Django Tests im Container ausführen
        run: docker compose exec -T web python manage.py test

      - name: Health-Check
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health/ | grep -q "ok"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for web service..."
            docker compose ps
            sleep 5
          done

          echo "Health check failed"
          docker compose logs --tail=200 web db
          exit 1

      - name: Aufräumen
        if: always()
        run: docker compose down -v --remove-orphans

  docker-image-scan:
    name: Docker-Image Build + Trivy
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Docker-Image bauen
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      - name: Trivy-Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: [docker-smoke-test, docker-image-scan]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'dev')
    environment:
      name: dev
    steps:
      - name: Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker compose exec -T web python manage.py migrate --noinput
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:8000/health/ | grep -q "ok"; then
                echo "Deployment OK"
                exit 0
              fi
              sleep 5
            done
            echo "Deployment failed"
            docker compose logs --tail=200 web db
            exit 1

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [docker-smoke-test, docker-image-scan]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'staging'
    environment:
      name: staging
    steps:
      - name: Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker compose exec -T web python manage.py migrate --noinput
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:8000/health/ | grep -q "ok"; then
                echo "Deployment OK"
                exit 0
              fi
              sleep 5
            done
            echo "Deployment failed"
            docker compose logs --tail=200 web db
            exit 1

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [docker-smoke-test, docker-image-scan]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    environment:
      name: production
    steps:
      - name: Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker compose exec -T web python manage.py migrate --noinput
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:8000/health/ | grep -q "ok"; then
                echo "Deployment OK"
                exit 0
              fi
              sleep 5
            done
            echo "Deployment failed"
            docker compose logs --tail=200 web db
            exit 1