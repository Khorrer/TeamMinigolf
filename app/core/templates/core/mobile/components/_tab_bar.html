<nav class="tab-bar" role="tablist" aria-label="Hauptnavigation">
  <a href="{% url 'dashboard' %}"
     class="tab-item {% if request.resolver_match.url_name == 'dashboard' %}tab-item--active{% endif %}"
     role="tab"
     aria-selected="{% if request.resolver_match.url_name == 'dashboard' %}true{% else %}false{% endif %}">
    <span class="tab-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10.5L12 3l9 7.5"></path>
        <path d="M5 9.8V21h14V9.8"></path>
      </svg>
    </span>
    <span class="tab-label">Home</span>
  </a>

  <a href="{% url 'session_list' %}"
     class="tab-item {% if request.resolver_match.url_name == 'session_list' or request.resolver_match.url_name == 'session_create' or request.resolver_match.url_name == 'session_detail' or request.resolver_match.url_name == 'scoring' %}tab-item--active{% endif %}"
     role="tab"
     aria-selected="{% if request.resolver_match.url_name == 'session_list' or request.resolver_match.url_name == 'session_create' or request.resolver_match.url_name == 'session_detail' or request.resolver_match.url_name == 'scoring' %}true{% else %}false{% endif %}">
    <span class="tab-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M12 3v18"></path>
        <path d="M3 12h18"></path>
      </svg>
    </span>
    <span class="tab-label">Spielen</span>
    {% include "core/mobile/components/_badge.html" with count=open_sessions_count %}
  </a>

  <a href="{% url 'stats' %}"
     class="tab-item {% if request.resolver_match.url_name == 'stats' or request.resolver_match.url_name == 'leaderboard' %}tab-item--active{% endif %}"
     role="tab"
     aria-selected="{% if request.resolver_match.url_name == 'stats' or request.resolver_match.url_name == 'leaderboard' %}true{% else %}false{% endif %}">
    <span class="tab-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 20V10"></path>
        <path d="M12 20V6"></path>
        <path d="M19 20V13"></path>
      </svg>
    </span>
    <span class="tab-label">Scores</span>
  </a>

  <a href="{% url 'player_list' %}"
     class="tab-item {% if request.resolver_match.url_name == 'player_list' or request.resolver_match.url_name == 'player_create' or request.resolver_match.url_name == 'player_edit' %}tab-item--active{% endif %}"
     role="tab"
     aria-selected="{% if request.resolver_match.url_name == 'player_list' or request.resolver_match.url_name == 'player_create' or request.resolver_match.url_name == 'player_edit' %}true{% else %}false{% endif %}">
    <span class="tab-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"></path>
      </svg>
    </span>
    <span class="tab-label">Profil</span>
  </a>
</nav>

<style>
  .tab-bar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 49px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid rgba(0, 0, 0, 0.2);
    z-index: 1000;
  }

  .tab-item {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    min-height: 44px;
    flex: 1;
    text-decoration: none;
    color: #8E8E93;
    font-size: 10px;
    gap: 2px;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-item--active {
    color: #007AFF;
  }

  .tab-icon {
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .tab-label {
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    font-weight: 500;
    letter-spacing: -0.1px;
  }
</style>
