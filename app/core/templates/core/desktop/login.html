{% extends "core/base.html" %}
{% block title %}Login – #TeamMinigolf{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow border-0">
      <div class="card-body p-4">
        <h3 class="card-title text-center mb-4"><i class="bi bi-flag-fill text-success"></i> #TeamMinigolf</h3>
        {% if form.errors %}
          <div class="alert alert-danger py-2 small">Benutzername oder Passwort falsch.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label small fw-bold">Benutzername</label>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Passwort</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100 shadow-sm">Anmelden</button>
        </form>
        <div class="text-center mt-4 pt-3 border-top">
          <span class="text-muted small">Noch kein Konto?</span> 
          <a href="{% url 'signup' %}" class="text-success text-decoration-none small fw-bold">Hier registrieren</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
