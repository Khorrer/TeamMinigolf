{% extends "core/base.html" %}
{% block title %}Login – #TeamMinigolf{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-body">
        <h3 class="card-title text-center mb-4"><i class="bi bi-flag-fill text-success"></i> #TeamMinigolf</h3>
        {% if form.errors %}
        <div class="alert alert-danger">Benutzername oder Passwort falsch.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Benutzername</label>
            <input type="text" name="username" id="id_username" class="form-control" autofocus required>
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">Passwort</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Anmelden</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
